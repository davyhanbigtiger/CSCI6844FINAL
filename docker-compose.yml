services:

  # ========================================================
  # MESSAGE BROKER
  # ========================================================
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================================
  # API GATEWAY - Single entry point for all client requests
  # Routes: /customers/** /products/** /orders/**
  # Aggregation: /api/aggregate/order-details/{id}
  # ========================================================
  api-gateway:
    container_name: api-gateway
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:8080"                             # 唯一对外暴露的端口
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      customerservice:
        condition: service_started
      productservice:
        condition: service_started
      orderservice:
        condition: service_started

  # ========================================================
  # CUSTOMER SERVICE
  # ========================================================
  customerservice:
    container_name: customer-service
    build:
      context: ./CustomerService/CustomerService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"                                  # 只在内网可见，不对外暴露
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - ./data/customers:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ========================================================
  # PRODUCT SERVICE
  # ========================================================
  productservice:
    container_name: product-service
    build:
      context: ./ProductService/ProductService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
    volumes:
      - ./data/products:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ========================================================
  # ORDER SERVICE
  # ========================================================
  orderservice:
    container_name: order-service
    build:
      context: ./OrderService/OrderService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      CustomerServiceUrl: http://customer-service:8080/
      ProductServiceUrl: http://product-service:8080/
      RabbitMQ__Host: rabbitmq
    volumes:
      - ./data/orders:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      customerservice:
        condition: service_started
      productservice:
        condition: service_started

  # ========================================================
  # NOTIFICATION SERVICE
  # ========================================================
  notificationservice:
    container_name: notification-service
    build:
      context: ./NotificationService/NotificationService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
  # ========================================================
  # BLAZOR FRONTEND
  # ========================================================
  blazorfrontend:
    container_name: blazor-frontend
    build:
      context: ./BlazorFrontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api-gateway